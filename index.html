<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>Doki Doki Literature Club!</title>
    </head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    
    <script>
        // REDIRECT LOGIC: Bypasses 20MB limit by using the unzipped /game/game folder
        const ASSET_PATH = "https://cdn.jsdelivr.net/gh/BreaddeningBread/EmeraldGreenR.github.io@main/game/game/";

        const originalFetch = window.fetch;
        window.fetch = async (...args) => {
            let url = args[0];

            // 1. Trick engine to stop looking for game.zip
            if (url.includes('game.zip')) {
                return new Response(null, { status: 404 });
            }

            // 2. Redirect asset calls from /game/ to /game/game/
            if (url.includes('/game/') && !url.endsWith('.js') && !url.endsWith('.wasm')) {
                const fileName = url.split('/game/').pop();
                return originalFetch(ASSET_PATH + fileName);
            }

            return originalFetch(...args);
        };

        // Service Worker
        navigator.serviceWorker && navigator.serviceWorker.register("./service-worker.js");
    </script>

    <script src="renpy-pre.js"></script>
    <script src="renpy.js" async></script>
</body>
</html>
