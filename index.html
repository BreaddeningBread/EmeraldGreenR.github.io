<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>DDLC Mod</title>
    <style>
        html, body { background: #000; height: 100%; margin: 0; overflow: hidden; }
        canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    
    <script>
        // Use the JSdelivr CDN to ensure school-friendly speeds
        const ASSET_PATH = "https://cdn.jsdelivr.net/gh/BreaddeningBread/EmeraldGreenR.github.io@main/game/game/";

        const originalFetch = window.fetch;
        window.fetch = async (...args) => {
            let url = args[0].toString();

            // 1. Tell the engine the zip is gone. 
            // This stops the engine from hanging while waiting for a missing file.
            if (url.includes('game.zip')) {
                return new Response(null, { status: 404 });
            }

            // 2. The Path-Preserving Redirect
            // This takes requests for 'game/images/sayori.png' 
            // and turns them into '.../game/game/images/sayori.png'
            if (url.includes('/game/') && !url.endsWith('.js') && !url.endsWith('.wasm')) {
                const match = url.match(/(?:\/|^)game\/(.*)/);
                if (match && match[1]) {
                    const finalUrl = ASSET_PATH + match[1];
                    return originalFetch(finalUrl);
                }
            }

            return originalFetch(...args);
        };
    </script>

    <script src="renpy-pre.js"></script>
    <script src="renpy.js" async></script>
</body>
</html>
