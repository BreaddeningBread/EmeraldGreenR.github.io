<!doctype html>
<html lang="en-us">
<head>
    <meta charset="utf-8">
    <title>DDLC Mod</title>
    <style>
        html, body { background: #000; height: 100%; margin: 0; overflow: hidden; }
        canvas { width: 100%; height: 100%; position: absolute; top: 0; left: 0; }
    </style>
</head>
<body>
    <canvas id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1"></canvas>
    
    <script>
        // Use your specific CDN path
        const CDN_ASSETS = "https://cdn.jsdelivr.net/gh/BreaddeningBread/EmeraldGreenR.github.io@main/game/game/";

        const originalFetch = window.fetch;
        window.fetch = async (...args) => {
            let url = args[0].toString();

            // 1. Force fail the zip to trigger folder-loading
            if (url.includes('game.zip')) {
                return new Response(null, { status: 404 });
            }

            // 2. Redirect asset calls from /game/ to /game/game/ and preserve subfolders
            if (url.includes('/game/') && !url.endsWith('.js') && !url.endsWith('.wasm')) {
                const parts = url.split('/game/');
                const subPath = parts[parts.length - 1]; 
                return originalFetch(CDN_ASSETS + subPath);
            }

            return originalFetch(...args);
        };
    </script>

    <script src="https://cdn.jsdelivr.net/gh/BreaddeningBread/EmeraldGreenR.github.io@main/renpy-pre.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/BreaddeningBread/EmeraldGreenR.github.io@main/renpy.js" async></script>
</body>
</html>
